name: SilentHell
options:
  bundleIdPrefix: com.br3nd4nt
  deploymentTarget:
    macOS: "15.0"
settings:
  base:
    PRODUCT_NAME: SilentHell
    SWIFT_VERSION: 6.0
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0
targets:
  SilentHell:
    type: application
    platform: macOS
    sources:
      - path: Sources
    settings:
      base:
        INFOPLIST_KEY_CFBundleDisplayName: SilentHell
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.developer-tools
        MACOSX_DEPLOYMENT_TARGET: 15.0
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.br3nd4nt.SilentHell
        SUPPORTS_MACCATALYST: NO
        SUPPORTED_PLATFORMS: macosx
schemes:
  SilentHell:
    build:
      targets:
        SilentHell: all
    run:
      config: Debug
    test:
      config: Debug
